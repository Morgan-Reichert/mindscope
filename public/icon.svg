<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- M lettermark — clean, bold, centered -->
  <!-- Left vertical stroke -->
  <rect x="102" y="148" width="54" height="220" rx="27" fill="white"/>
  <!-- Right vertical stroke -->
  <rect x="356" y="148" width="54" height="220" rx="27" fill="white"/>
  <!-- Left diagonal (top-left to center-bottom) -->
  <polygon points="102,148 156,148 280,272 228,316" fill="white"/>
  <!-- Right diagonal (top-right to center-bottom) -->
  <polygon points="356,148 410,148 284,272 232,316" fill="white"/>

  <!-- Small pulsing dot below — subtle brand detail -->
  <circle cx="256" cy="420" r="16" fill="white" opacity="0.35"/>
</svg>
