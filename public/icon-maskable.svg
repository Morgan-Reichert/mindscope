<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (maskable — no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- M lettermark — slightly smaller to stay in the 80% safe zone -->
  <!-- Safe zone: 51px padding on each side (10% = 51.2px) -->
  <!-- Left vertical stroke -->
  <rect x="122" y="168" width="50" height="182" rx="25" fill="white"/>
  <!-- Right vertical stroke -->
  <rect x="340" y="168" width="50" height="182" rx="25" fill="white"/>
  <!-- Left diagonal -->
  <polygon points="122,168 172,168 270,268 218,310" fill="white"/>
  <!-- Right diagonal -->
  <polygon points="340,168 390,168 294,268 244,310" fill="white"/>
</svg>
